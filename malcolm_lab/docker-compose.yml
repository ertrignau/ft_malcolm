version: "3.8"

services:
  victim:
    build:
      context: ..
      dockerfile: malcolm_lab/victim/Dockerfile
    container_name: victim
    privileged: true
    networks:
      malcolm_net:
        ipv4_address: 172.20.0.2
    command: sleep infinity

  attacker:
    build:
      context: ..
      dockerfile: malcolm_lab/attacker/Dockerfile
    container_name: attacker
    privileged: true
    networks:
      malcolm_net:
        ipv4_address: 172.20.0.3
    command: sleep infinity
  
networks:
  malcolm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
